<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 280" fill="none">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FF6B00"/>
    </linearGradient>
    <linearGradient id="dark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1C1810"/>
      <stop offset="100%" stop-color="#0D0B07"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Monitor frame -->
  <rect x="20" y="20" width="260" height="190" rx="16" fill="url(#dark)" stroke="url(#gold)" stroke-width="1.5" opacity="0.9"/>
  <!-- Screen top bar -->
  <rect x="20" y="20" width="260" height="36" rx="16" fill="#1C1810"/>
  <rect x="20" y="42" width="260" height="14" fill="#1C1810"/>
  <!-- Dots -->
  <circle cx="42" cy="38" r="5" fill="#FF5F57"/>
  <circle cx="58" cy="38" r="5" fill="#FFBD2E"/>
  <circle cx="74" cy="38" r="5" fill="#28C840"/>
  <!-- Title bar text -->
  <rect x="100" y="32" width="120" height="12" rx="6" fill="#24201A"/>
  <!-- Code lines -->
  <rect x="48" y="72" width="60" height="8" rx="4" fill="#FFD700" opacity="0.7" filter="url(#glow)"/>
  <rect x="116" y="72" width="40" height="8" rx="4" fill="#FF8C00" opacity="0.5"/>
  <rect x="164" y="72" width="80" height="8" rx="4" fill="#2E2920"/>
  
  <rect x="48" y="92" width="30" height="8" rx="4" fill="#2E2920"/>
  <rect x="86" y="92" width="90" height="8" rx="4" fill="#FFA500" opacity="0.6"/>
  <rect x="184" y="92" width="60" height="8" rx="4" fill="#2E2920"/>
  
  <rect x="48" y="112" width="20" height="8" rx="4" fill="#2E2920"/>
  <rect x="76" y="112" width="50" height="8" rx="4" fill="#FFD700" opacity="0.4"/>
  <rect x="134" y="112" width="100" height="8" rx="4" fill="#2E2920"/>
  
  <rect x="64" y="132" width="80" height="8" rx="4" fill="#FF6B00" opacity="0.5"/>
  <rect x="152" y="132" width="40" height="8" rx="4" fill="#2E2920"/>
  <rect x="200" y="132" width="50" height="8" rx="4" fill="#FFD700" opacity="0.3"/>
  
  <rect x="48" y="152" width="110" height="8" rx="4" fill="#2E2920"/>
  <rect x="166" y="152" width="70" height="8" rx="4" fill="#FFC200" opacity="0.45"/>
  
  <rect x="48" y="172" width="40" height="8" rx="4" fill="#2E2920"/>
  <rect x="96" y="172" width="130" height="8" rx="4" fill="#2E2920"/>
  
  <!-- Stand -->
  <rect x="140" y="210" width="40" height="24" rx="4" fill="#1C1810" stroke="#FFD700" stroke-width="1" stroke-opacity="0.3"/>
  <rect x="110" y="234" width="100" height="10" rx="5" fill="#1C1810" stroke="#FFD700" stroke-width="1" stroke-opacity="0.3"/>
  
  <!-- Floating sparkles -->
  <circle cx="290" cy="30" r="3" fill="#FFD700" opacity="0.6"/>
  <circle cx="10" cy="80" r="2" fill="#FFA500" opacity="0.5"/>
  <circle cx="300" cy="180" r="2.5" fill="#FFD700" opacity="0.4"/>
  <circle cx="5" cy="200" r="1.5" fill="#FF8C00" opacity="0.6"/>
  
  <!-- Corner accent -->
  <path d="M260 20 L280 20 L280 40" stroke="url(#gold)" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M20 170 L20 190 L40 190" stroke="url(#gold)" stroke-width="2" fill="none" opacity="0.5"/>
</svg>